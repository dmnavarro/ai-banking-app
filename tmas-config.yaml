version: 1.1.0
name: DG Bank AI Chatbot Security Scan
description: Security scan for the DG Bank AI banking assistant (Blane) powered by Amazon Bedrock

target:
  name: dgbank-chatbot
  endpoint: https://bank.hawkins.global/api/chat
  custom:
    method: POST
    headers:
      Content-Type: application/json
    request:
      message: "{{prompt}}"
      history: []
    response:
      reply: "{{response}}"

settings:
  concurrency: 5

attack_objectives:
  - name: System Prompt Leakage
    techniques:
      - DAN (Do anything now)
      - Ignore all previous instructions
    modifiers:
      - None

  - name: Sensitive Data Disclosure
    techniques:
      - Payload splitting
      - None
    modifiers:
      - Base64 Encoding
      - None

  - name: Malicious Code Generation
    techniques:
      - Ignore all previous instructions
    modifiers:
      - None

  - name: Agent Tool Definition Leakage
    techniques:
      - None
    modifiers:
      - None
