name: Build and Deploy to ECS

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  AWS_REGION: ap-southeast-1
  ECR_REPOSITORY: dgbank-ai-app-demo
  ECS_CLUSTER: dgbank-ai-app-demo
  ECS_SERVICE: dgbank-ai-app-demo

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}"
          IMAGE_URI_LATEST="$ECR_REGISTRY/$ECR_REPOSITORY:latest"

          docker build --platform linux/amd64 -t "$IMAGE_URI" -t "$IMAGE_URI_LATEST" .
          docker push "$IMAGE_URI"
          docker push "$IMAGE_URI_LATEST"

          echo "image=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Code Security Scan (TMAS)
        if: ${{ secrets.TMAS_API_KEY != '' }}
        uses: trendmicro/tmas-scan-action@v3.1.3
        with:
          vulnerabilitiesScan: true
          secretsScan: true
          malwareScan: false
          artifact: dir:.
          additionalArgs: --region=ap-southeast-1
          tmasApiKey: ${{ secrets.TMAS_API_KEY }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --force-new-deployment \
            --region "$AWS_REGION" \
            --output text --query "service.serviceName"

          echo "Waiting for ECS service to stabilize..."
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --region "$AWS_REGION"

          echo "Deployed to: https://bank.hawkins.global"
