name: Build and Deploy to AWS App Runner

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  AWS_REGION: ap-southeast-1
  ECR_REPOSITORY: trend-bank
  APP_RUNNER_SERVICE: trend-bank
  APP_RUNNER_PORT: "3000"
  CUSTOM_DOMAIN: bank.hawkins.global

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}"
          IMAGE_URI_LATEST="$ECR_REGISTRY/$ECR_REPOSITORY:latest"

          docker build -t "$IMAGE_URI" -t "$IMAGE_URI_LATEST" .
          docker push "$IMAGE_URI"
          docker push "$IMAGE_URI_LATEST"

          echo "image=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Code Security Scan (TMAS)
        uses: trendmicro/tmas-scan-action@v3.1.3
        with:
          vulnerabilitiesScan: true
          secretsScan: true
          malwareScan: false
          artifact: dir:.
          additionalArgs: --region=ap-southeast-1
          tmasApiKey: ${{ secrets.TMAS_API_KEY }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to App Runner
        env:
          IMAGE_URI: ${{ steps.build-image.outputs.image }}
          ACCESS_ROLE_ARN: ${{ secrets.APP_RUNNER_ACCESS_ROLE_ARN }}
          WAF_WEBACL_ARN: ${{ secrets.WAF_WEBACL_ARN }}
        run: |
          SERVICE_ARN=$(aws apprunner list-services \
            --query "ServiceSummaryList[?ServiceName=='$APP_RUNNER_SERVICE'].ServiceArn" \
            --output text)

          if [ -n "$SERVICE_ARN" ]; then
            echo "Waiting for any in-progress operation to finish..."
            for i in $(seq 1 40); do
              STATUS=$(aws apprunner describe-service \
                --service-arn "$SERVICE_ARN" \
                --query "Service.Status" --output text)
              echo "  [$i/40] Status: $STATUS"
              if [ "$STATUS" != "OPERATION_IN_PROGRESS" ]; then break; fi
              sleep 15
            done
          fi

          if [ -z "$SERVICE_ARN" ]; then
            echo "Creating new App Runner service: $APP_RUNNER_SERVICE"
            SERVICE_ARN=$(aws apprunner create-service \
              --service-name "$APP_RUNNER_SERVICE" \
              --source-configuration "{
                \"ImageRepository\": {
                  \"ImageIdentifier\": \"$IMAGE_URI\",
                  \"ImageRepositoryType\": \"ECR\",
                  \"ImageConfiguration\": {
                    \"Port\": \"$APP_RUNNER_PORT\"
                  }
                },
                \"AuthenticationConfiguration\": {
                  \"AccessRoleArn\": \"$ACCESS_ROLE_ARN\"
                }
              }" \
              --instance-configuration "{
                \"Cpu\": \"0.25 vCPU\",
                \"Memory\": \"0.5 GB\"
              }" \
              --query "Service.ServiceArn" \
              --output text)

            if [ -n "$WAF_WEBACL_ARN" ]; then
              echo "Associating WAF Web ACL..."
              aws wafv2 associate-web-acl \
                --web-acl-arn "$WAF_WEBACL_ARN" \
                --resource-arn "$SERVICE_ARN" \
                --region "$AWS_REGION"
            fi
          else
            echo "Updating existing App Runner service: $SERVICE_ARN"
            aws apprunner update-service \
              --service-arn "$SERVICE_ARN" \
              --source-configuration "{
                \"ImageRepository\": {
                  \"ImageIdentifier\": \"$IMAGE_URI\",
                  \"ImageRepositoryType\": \"ECR\",
                  \"ImageConfiguration\": {
                    \"Port\": \"$APP_RUNNER_PORT\"
                  }
                },
                \"AuthenticationConfiguration\": {
                  \"AccessRoleArn\": \"$ACCESS_ROLE_ARN\"
                }
              }"
          fi

          echo "Waiting for service to be RUNNING..."
          for i in $(seq 1 40); do
            STATUS=$(aws apprunner describe-service \
              --service-arn "$SERVICE_ARN" \
              --query "Service.Status" --output text)
            echo "  [$i/40] Status: $STATUS"
            if [ "$STATUS" = "RUNNING" ]; then break; fi
            if [ "$STATUS" = "CREATE_FAILED" ] || [ "$STATUS" = "UPDATE_FAILED" ]; then
              echo "Service failed with status: $STATUS"
              exit 1
            fi
            sleep 15
          done

          URL=$(aws apprunner describe-service \
            --service-arn "$SERVICE_ARN" \
            --query "Service.ServiceUrl" \
            --output text)

          echo "Deployed to: https://$URL"

          # Associate custom domain if not already linked
          ALREADY_LINKED=$(aws apprunner describe-custom-domains \
            --service-arn "$SERVICE_ARN" \
            --query "CustomDomains[?DomainName=='$CUSTOM_DOMAIN'].DomainName" \
            --output text)

          if [ -z "$ALREADY_LINKED" ]; then
            echo "Associating custom domain: $CUSTOM_DOMAIN"
            aws apprunner associate-custom-domain \
              --service-arn "$SERVICE_ARN" \
              --domain-name "$CUSTOM_DOMAIN" > /dev/null
          fi

          echo ""
          echo "===== DNS RECORDS REQUIRED ====="
          echo "Add these CNAMEs at your DNS provider (hawkins.global):"
          echo ""
          echo "1. Point your domain to App Runner:"
          echo "   $CUSTOM_DOMAIN  →  CNAME  →  $URL"
          echo ""
          echo "2. Certificate validation records (waiting for records to populate)..."
          for i in $(seq 1 10); do
            RECORDS=$(aws apprunner describe-custom-domains \
              --service-arn "$SERVICE_ARN" \
              --query "CustomDomains[?DomainName=='$CUSTOM_DOMAIN'].CertificateValidationRecords[]" \
              --output json)
            COUNT=$(echo "$RECORDS" | jq 'length')
            if [ "$COUNT" -gt 0 ]; then
              echo "$RECORDS" | jq -r '.[] | "   \(.Name)  →  CNAME  →  \(.Value)"'
              break
            fi
            echo "   waiting... ($i/10)"
            sleep 10
          done
          echo "================================"
