name: Build and Deploy to ECS

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  AWS_REGION: ap-southeast-1
  ECR_REPOSITORY: dgbank-ai-app-demo
  ECS_CLUSTER: dgbank-ai-app-demo
  ECS_SERVICE: dgbank-ai-app-demo

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      TMAS_API_KEY: ${{ secrets.TMAS_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}"
          IMAGE_URI_LATEST="$ECR_REGISTRY/$ECR_REPOSITORY:latest"

          docker build --platform linux/amd64 -t "$IMAGE_URI" -t "$IMAGE_URI_LATEST" .
          docker push "$IMAGE_URI"
          docker push "$IMAGE_URI_LATEST"

          echo "image=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Code Security Scan (TMAS)
        if: ${{ env.TMAS_API_KEY != '' }}
        uses: trendmicro/tmas-scan-action@v3.1.3
        with:
          vulnerabilitiesScan: true
          secretsScan: true
          malwareScan: false
          artifact: dir:.
          additionalArgs: --region=ap-southeast-1
          tmasApiKey: ${{ secrets.TMAS_API_KEY }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync TMAS API key to SSM
        if: ${{ env.TMAS_API_KEY != '' }}
        run: |
          aws ssm put-parameter \
            --name "/dgbank/tmas-api-key" \
            --value "$TMAS_API_KEY" \
            --type SecureString \
            --overwrite \
            --region "$AWS_REGION"

      - name: Deploy to ECS
        env:
          IMAGE_URI: ${{ steps.build-image.outputs.image }}
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          FILESCAN_BUCKET="dg-bank-scanning-${ACCOUNT_ID}-${AWS_REGION}"

          # Get current task definition and inject updated image + FILESCAN_BUCKET
          TASK_DEF_ARN=$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --region "$AWS_REGION" \
            --query "services[0].taskDefinition" \
            --output text)

          NEW_TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition "$TASK_DEF_ARN" \
            --region "$AWS_REGION" \
            --query "taskDefinition" | \
            jq --arg img "$IMAGE_URI" --arg bucket "$FILESCAN_BUCKET" '
              .containerDefinitions[0].image = $img |
              .containerDefinitions[0].environment |=
                (map(select(.name != "FILESCAN_BUCKET")) + [{"name":"FILESCAN_BUCKET","value":$bucket}]) |
              del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.compatibilities,.registeredAt,.registeredBy)
            ')

          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --region "$AWS_REGION" \
            --query "taskDefinition.taskDefinitionArn" \
            --output text)

          echo "Registered task definition: $NEW_ARN"

          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --task-definition "$NEW_ARN" \
            --region "$AWS_REGION" \
            --output text --query "service.serviceName"

          echo "Waiting for ECS service to stabilize..."
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --region "$AWS_REGION"

          echo "Deployed to: https://bank.hawkins.global"
